# Consumer workflow for the OWASP-CTF/VAmPI CTF fork.
#
# Replaces the hand-rolled ctf-score.yml: OWASP-CTF/score-action does everything — checks out
# the PR head, mints the OIDC id-token, builds + boots the app (vulnerable=1 + GET /createdb
# seed), scores it against the embedded rubric, and records the result. The boot lives in the
# scorer image's baked entrypoint, so this repo no longer hand-rolls containers.
#
# The PR's untrusted code only ever runs inside containers on an --internal network, never on
# the runner host. Do NOT add a step that runs PR-controlled code directly here.
name: score

on:
  pull_request_target:
    branches: [master]
    types: [opened, synchronize, reopened]

concurrency:
  group: score-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read # the action checks out the PR head to docker-build
      packages: read # the action pulls the org-internal scorer image
      id-token: write # the action mints the OIDC id-token POST /score authorizes
      pull-requests: write # the result comment
    steps:
      - name: Score + record
        uses: OWASP-CTF/score-action@main
        with:
          target: vampi
          # VAmPI's Flask app listens on :5000 inside the sandbox network.
          app-url: http://app:5000
